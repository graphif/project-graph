<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Project Graph</title>
  </head>
  <body class="bg-transparent">
    <div id="root" class="h-screen"></div>
    <script type="module">
      // 此处configureSerializer必须在所有代码的最开头
      // 否则@serializable装饰器无法获取正确的类名
      import { configureSerializer } from "@graphif/serializer";
      import { getOriginalNameOf } from "virtual:original-class-name";
      configureSerializer(getOriginalNameOf);
      console.log("Serializer configured");

      if (navigator.userAgent.includes("Linux") && !window.__IS_QT_RENDERER__) {
        console.log("Running in proxy mode (native window), skipping application main script.");
      } else {
        const script = document.createElement("script");
        script.type = "module";
        script.src = "/src/main.tsx";
        document.body.appendChild(script);
      }
    </script>
  </body>
</html>
