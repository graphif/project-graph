<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Project Graph</title>
  </head>
  <body class="bg-transparent">
    <div id="root" class="h-screen"></div>
    <script type="module">
      console.log("Project Graph");

      import { getCurrentWindow } from "@tauri-apps/api/window";
      console.log(navigator.userAgent);
      if (navigator.userAgent.includes("Linux") && !window.ipc_bridge) {
        console.log("Running on Linux, closing this WebKitGTK window to prevent potential issues.");
        getCurrentWindow().close();
      }

      // 此处configureSerializer必须在所有代码的最开头
      // 否则@serializable装饰器无法获取正确的类名
      import { configureSerializer } from "@graphif/serializer";
      import { getOriginalNameOf } from "virtual:original-class-name";
      configureSerializer(getOriginalNameOf);
      console.log("Serializer configured");
    </script>
    <script src="/src/main.tsx" type="module"></script>
  </body>
</html>
