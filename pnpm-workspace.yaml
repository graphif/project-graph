packages:
  - "app"
  - "docs"
  - "packages/*"

overrides:
  "@types/react": "catalog:"

catalog:
  react: ^19.1.0
  "@types/react": ^19.1.0
  react-dom: ^19.1.0
  typescript: 5.9.2
  tsdown: ^0.21.10
  jotai: ^2.12.5

onlyBuiltDependencies:
  - "@swc/core"
  - bcrypt
  - esbuild
  - msw
  - sharp

patchedDependencies:
  typescript: "patches/typescript.patch"

allowBuilds:
  bcrypt: true
  core-js: true
  esbuild: true
  msw: true
  nx: true

resolutionMode: time-based
